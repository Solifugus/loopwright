# Loopwright host configuration.
# Copy to ~/.config/loopwright/config.yaml and adjust.
# Every key is optional; these are the values for Matthew's host.

projects_dir: ~/development/loopwright/projects

# REQUIRED. Clone of github.com/Solifugus/loopwright-doctrine; it must contain
# PRINCIPLES.md and AGENT_RULES.md. New projects are pre-populated from its
# templates and carry those files under docs/agent/. Project creation refuses
# to proceed without a valid doctrine_dir (`loopwright config check` errors).
doctrine_dir: ~/development/loopwright-doctrine

libvirt_uri: qemu:///system

dev_vm:
  domain: LoopWright_Dev
  host: 192.168.122.20
  user: master

test_vm:
  domain: loopwright_test
  host: 192.168.122.120
  user: master
  # Clean snapshot reverted before every deployment test.
  snapshot: deployment-ready

ntfy_server: https://ntfy.sh
# Pick a hard-to-guess topic name; anyone who knows it can read your notifications.
ntfy_topic: loopwright-solifugus

# Public base URL of the web UI, reachable from your phone. When set, PROVISIONAL
# notifications carry ACK/REVERT buttons that POST to these routes. Leave unset
# to send plain notifications.
web_base_url: http://192.168.122.1:8000

# Name of the environment variable holding the OpenAI API key for the Primary Agent.
openai_api_key_env: OPENAI_API_KEY
openai_model: gpt-4o

# Minutes to wait before auto-resuming a run parked by an AI usage limit.
limit_resume_minutes: 30

# Max unreviewed PROVISIONAL (structural) decisions allowed before a run pauses
# for human review rather than building further on unreviewed guesses.
provisional_cap: 2
