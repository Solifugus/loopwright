<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Loopwright{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9; --panel: #ffffff; --ink: #1c2733; --muted: #66778a;
      --line: #dde3ea; --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--line);
      padding: 0.7rem 1.5rem; display: flex; align-items: baseline; gap: 0.75rem;
    }
    header a.brand { font-weight: 700; font-size: 1.15rem; color: var(--ink); text-decoration: none; }
    header span.tag { color: var(--muted); font-size: 0.85rem; }
    main { max-width: 60rem; margin: 1.5rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.35rem; }
    a { color: var(--accent); }
    table { width: 100%; border-collapse: collapse; background: var(--panel); }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
    .muted { color: var(--muted); }
    code { background: var(--bg); padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.9em; }
    .state {
      display: inline-block; padding: 0.1rem 0.6rem; border-radius: 999px;
      font-size: 0.8rem; font-weight: 600; border: 1px solid transparent;
    }
    .state-DRAFT { background: #eef1f5; color: #475569; }
    .state-READY { background: #e0edff; color: #1d4ed8; }
    .state-RUNNING { background: #dcfce7; color: #15803d; }
    .state-PAUSED, .state-PAUSED_LIMIT { background: #fef3c7; color: #b45309; }
    .state-REVIEW { background: #ede9fe; color: #6d28d9; }
    .state-DONE { background: #d1fae5; color: #047857; }
    .state-FAILED { background: #fee2e2; color: #b91c1c; }
    .state-STOPPED { background: #e5e7eb; color: #374151; }
    a.button {
      display: inline-block; background: var(--accent); color: #fff; text-decoration: none;
      padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
    }
    button {
      background: var(--panel); color: var(--ink); border: 1px solid var(--line);
      padding: 0.4rem 1rem; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer;
    }
    button.approve { background: #15803d; border-color: #15803d; color: #fff; }
    input[type="text"] {
      font: inherit; padding: 0.4rem 0.6rem; border: 1px solid var(--line);
      border-radius: 6px; width: 100%; max-width: 24rem;
    }
    textarea {
      width: 100%; font: 0.85rem/1.45 ui-monospace, "Cascadia Code", monospace;
      border: 1px solid var(--line); border-radius: 6px; padding: 0.6rem; resize: vertical;
    }
    .panel.flash { border-color: #86efac; background: #f0fdf4; }
    .panel.error { border-color: #fca5a5; background: #fef2f2; color: #b91c1c; }
    .error-text { color: #b91c1c; }
    .nowrap { white-space: nowrap; }
    .lvl {
      display: inline-block; padding: 0.05rem 0.5rem; border-radius: 999px;
      font-size: 0.78rem; font-weight: 600;
    }
    .lvl-debug { background: #eef1f5; color: #64748b; }
    .lvl-info { background: #e0edff; color: #1d4ed8; }
    .lvl-warning { background: #fef3c7; color: #b45309; }
    .lvl-error { background: #fee2e2; color: #b91c1c; }
    form#filters label { margin-right: 1.25rem; }
    select { font: inherit; padding: 0.25rem 0.4rem; border: 1px solid var(--line); border-radius: 6px; }
    button.ctl { margin-left: 0.35rem; }
    button.ctl-start, button.ctl-resume { background: #15803d; border-color: #15803d; color: #fff; }
    button.ctl-pause { background: #b45309; border-color: #b45309; color: #fff; }
    button.ctl-stop { background: #b91c1c; border-color: #b91c1c; color: #fff; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">Loopwright</a>
    <span class="tag">autonomous execution, human-owned intent</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
